name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './src/subosity-www.disabled/package.json'
          
      - name: Create .env file
        run: |
          echo "VITE_APP_URL=${{ secrets.VITE_APP_URL }}" >> ./src/subosity-www.disabled/.env

      - name: Generate Version
        id: version
        run: |
          TIMESTAMP=$(date '+%Y.%m%d.%H%M')
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v${TIMESTAMP}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo ${VERSION} > ./src/subosity-www.disabled/public/version.txt

      - name: Install Dependencies
        working-directory: ./src/subosity-www.disabled
        run: npm ci
        
      - name: Build
        working-directory: ./src/subosity-www.disabled
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './src/subosity-www.disabled/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5