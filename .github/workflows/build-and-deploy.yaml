name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './src/subosity-www/package-lock.json'

      - name: Install Dependencies
        working-directory: ./src/subosity-www
        run: npm ci
        
      - name: Build
        working-directory: ./src/subosity-www
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './src/subosity-www/public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5